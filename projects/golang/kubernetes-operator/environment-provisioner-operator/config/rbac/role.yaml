---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - resourcequotas
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - balleon.local
  resources:
  - environmentprovisioners
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - balleon.local
  resources:
  - environmentprovisioners/finalizers
  verbs:
  - update
- apiGroups:
  - balleon.local
  resources:
  - environmentprovisioners/status
  verbs:
  - get
  - patch
  - update
