apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test
  name: test
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
      annotations:
        instrumentation.opentelemetry.io/inject-python: "opentelemetry/instrumentation"
        sidecar.opentelemetry.io/inject: "opentelemetry/collector"
    spec:
      containers:
      - image: digitalocean/flask-helloworld
        name: flask-helloworld
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: test
  name: test
  namespace: default
spec:
  ports:
  - port: 5000
    protocol: TCP
    targetPort: 5000
  selector:
    app: test
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-test-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /test
        pathType: Prefix
        backend:
          service:
            name: test
            port:
              number: 5000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: test-strip-prefix
  namespace: default
spec:
  stripPrefix:
    prefixes:
    - /test