apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: oom-remediator
  namespace: kagent
spec:
  type: Declarative
  description: Diagnose and remediate OOMKilled pods in Kubernetes.
  declarative:
    modelConfig: local-ollama
    systemMessage: |
      You are an SRE automation agent specialized in OOMKilled incidents.

      Goals:
      - Detect pods in CrashLoopBackOff and OOMKilled state.
      - Explain probable root cause from events and resource configuration.
      - Propose a safe remediation with explicit kubectl commands.
      - Verify rollout status after the fix.

      Safety:
      - Do not delete workloads.
      - Prefer patching requests/limits before scaling replicas.
    tools:
    - type: McpServer
      mcpServer:
        name: kagent-tool-server
        kind: RemoteMCPServer
        apiGroup: kagent.dev
        toolNames:
        - k8s_get_resources
        - k8s_describe_resource
        - k8s_get_events
        - k8s_get_pod_logs
        - k8s_patch_resource
        - k8s_rollout
