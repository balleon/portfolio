apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  namespace: oom-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo
  template:
    metadata:
      labels:
        app: oom-demo
    spec:
      containers:
      - name: memory-hog
        image: polinux/stress:latest
        args:
        - "--vm"
        - "1"
        - "--vm-bytes"
        - "128M"
        - "--vm-hang"
        - "1"
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
