name: pulumi-eks
description: Deploy an EKS Cluster with AWS Python Pulumi program
runtime:
  name: python
  options:
    toolchain: pip
    virtualenv: venv
config:
  pulumi:tags:
    value:
      pulumi:template: aws-python
  eks_version: ""
  vpc_cidr: ""
  private_subnet_cidrs: {}
  public_subnet_cidrs: {}
  availability_zones: {}
